.create-rpm-env:
    extends:
        - .rpmrepo-container-rules
        - .add-ssh-key
    stage: prepare
#    variables:
#        RPM_REPO: "/var/www/html/repo/gem-rtsw-$MATURITY/$CI_PROJECT_NAME/$CI_COMMIT_BRANCH/centos-8/x86_64"
#        RPM_REPO_SOURCE: "/var/www/html/repo/gem-rtsw-testing/$CI_PROJECT_NAME/centos-8/x86_64"
    script:
        - gem-ci/scripts/create-rpm-env.sh
    allow_failure: false
    tags:
        - gem-rtsw-docker

.create-config:
#    extends:
#        .rpmrepo-container-rules
    rules:
        - if: '$CI_PIPELINE_SOURCE == "pipeline"'
        - if: '$CI_PIPELINE_SOURCE == "trigger"'
        - *rpmrepo-container-app-stable
        - *rpmrepo-container-app-testing
        - *rpmrepo-container-app-unstable
        - *rpmrepo-container-epics-base-stable
        - *rpmrepo-container-epics-base-testing
        - *rpmrepo-container-epics-base-unstable
        - *rpmrepo-container-common-stable
        - *rpmrepo-container-common-testing
        - *rpmrepo-container-common-unstable
    stage: configure
    script:
        - gem-ci/scripts/create-config.sh
    artifacts:
        paths:
        # make the following files available for the next job
        - gem-rtsw-$TYPE.tpl
        - gem-rtsw-$TYPE.cfg
        - gem-rtsw-$TYPE.repo
        - releasers.conf
        - Containerfile
    tags:
        - gem-rtsw-docker

.deploy-to-rpm-repo:
    stage: build
    extends:
        - .rpmrepo-container-rules
        - .add-ssh-key-tito
    # not the global one, because it needs to install tito here
    script:
        - gem-ci/scripts/deploy-to-rpm-repo.sh
    after_script:
        # create artifacts
        - cp -r /var/lib/mock/gem-rtsw-$TYPE-$MATURITY/result mock-results
    artifacts:
        when: always
        paths:
        # make the following files available for debugging
        - releasers.conf
        - mock-results/build.log
        - mock-results/hw_info.log
        - mock-results/installed_pkgs.log
        - mock-results/root.log
        - mock-results/state.log
        # .. and for container deployment, where the file is
        # referenced in the Containerfile
        - .tito/releasers.conf
    # allow failure if RPM cannot be build, e.g. because parts of the
    # support modules have not yet been ported
    allow_failure: 
        exit_codes:
            - 123
    tags:
        - gem-rtsw-docker
    environment:
        name: ${MATURITY}/rpm
        deployment_tier: development

.deploy-container:
#    extends:
#        .rpmrepo-container-rules
    rules:
        - if: '$CI_PIPELINE_SOURCE == "pipeline"'
        - if: '$CI_PIPELINE_SOURCE == "trigger"'
        - *rpmrepo-container-app-stable
        - *rpmrepo-container-app-testing
        - *rpmrepo-container-app-unstable
        - *rpmrepo-container-epics-base-stable
        - *rpmrepo-container-epics-base-testing
        - *rpmrepo-container-epics-base-unstable
        - *rpmrepo-container-common-stable
        - *rpmrepo-container-common-testing
        - *rpmrepo-container-common-unstable
    stage: deploy
    image: docker:19.03.12
    services:
        - docker:19.03.12-dind
    before_script:
        - docker info
    script:
        - echo "CI_PROJECT_NAME is set to $CI_PROJECT_NAME"
        - echo "TYPE is set to $TYPE"
        - >-
          if [[ "$TYPE" == "common" && "$CI_PROJECT_NAME" == "gemini-ade" \
            || "$TYPE" == "epics-base" && "$CI_PROJECT_NAME" == "epics-base" \
            || "$TYPE" == "app" ]]; then
              # login
              docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
              # build container image with tag $CI_COMMIT_SHORT_SHA
              docker build -t $(echo $CI_REGISTRY_IMAGE/$CI_COMMIT_BRANCH:$CI_COMMIT_SHORT_SHA | tr '[:upper:]' '[:lower:]') --no-cache -f Containerfile .
              docker push $(echo $CI_REGISTRY_IMAGE/$CI_COMMIT_BRANCH:$CI_COMMIT_SHORT_SHA | tr '[:upper:]' '[:lower:]')
              # and for the tag 'latest'
              docker build -t $(echo $CI_REGISTRY_IMAGE/$CI_COMMIT_BRANCH:latest | tr '[:upper:]' '[:lower:]') -f Containerfile .
              docker push $(echo $CI_REGISTRY_IMAGE/$CI_COMMIT_BRANCH:latest | tr '[:upper:]' '[:lower:]') 
              # and also for the tag 'latest' without branch specification (which is convenient for stable)
              docker build -t $(echo $CI_REGISTRY_IMAGE/$MATURITY:latest | tr '[:upper:]' '[:lower:]') -f Containerfile .
              docker push $(echo $CI_REGISTRY_IMAGE/$MATURITY:latest | tr '[:upper:]' '[:lower:]') 
          fi
    allow_failure: 
        exit_codes:
            - 123
    tags:
        - gem-rtsw-docker
    environment:
        name: ${MATURITY}/container
        deployment_tier: development

###
# for building and releasing rpms for projects located in the 'support' subgroup
.set-base-container:
    image: centos:8
    stage: prepare
    extends:
        - .buildrpm-rules
    script:
        - source gem-ci/scripts/set-base-container.sh
    tags:
        - gem-rtsw-docker
    artifacts:
        reports:
            dotenv: prepare.env

.deploy-other-rpm:
    image: $NEW_BASE_CONTAINER
    stage: build
    extends:
        - .buildrpm-rules
        - .add-ssh-key-tito
    #rules:
    #    # only run triggered by pipeline
    #    - if: '$CI_PIPELINE_SOURCE == "pipeline"'
    script:
        - gem-ci/scripts/deploy-other-rpm.sh
    after_script:
        # create artifacts
        - cp -r /var/lib/mock/gem-rtsw-$TYPE-$MATURITY/result mock-results
    artifacts:
        when: always
        paths:
        # make the following files available for debugging
        - .tito/releasers.conf
        - mock-results/build.log
        - mock-results/hw_info.log
        - mock-results/installed_pkgs.log
        - mock-results/root.log
        - mock-results/state.log
    tags:
        - gem-rtsw-docker
    environment:
        name: ${MATURITY}/rpm
        deployment_tier: development

# This job triggers a multi-project pipeline to rebuild the 
# container of the target project (i.e. either gemini-ade,
# epics-base or one of the IOCs)
.trigger-container-rebuild:
    image: $NEW_BASE_CONTAINER
    stage: deploy
    extends:
        - .buildrpm-rules
    variables:
        MATURITY: $MATURITY
        CI_COMMIT_BRANCH: $CONTAINER_PROJECT_BRANCH
    script:
        - 'curl --request POST --form token=$CI_JOB_TOKEN 
            --form ref=$CONTAINER_PROJECT_BRANCH 
            --form "variables[TYPE]=$TYPE" 
            --form "variables[MATURITY]=$MATURITY" 
            "https://gitlab.com/api/v4/projects/$CONTAINER_PROJECT_HTML/trigger/pipeline"'
#        - python gem-ci/python/trigger-container-rebuild.py
    tags:
        - gem-rtsw-docker

