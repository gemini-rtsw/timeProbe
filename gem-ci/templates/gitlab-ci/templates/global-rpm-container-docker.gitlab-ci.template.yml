stages:
    - prepare 
    - configure
    - build
    - deploy

variables:
    GIT_SUBMODULE_STRATEGY: recursive
    # stable, testing or unstable
    MATURITY: unstable
    # app, common or epics-base
    TYPE: app
    # mock templates files location, should not change
    MOCK_TEMPLATE_COMMON: "/etc/mock/templates/gem-rtsw-common.tpl"
    MOCK_TEMPLATE_EPICS: "/etc/mock/templates/gem-rtsw-epics-base.tpl"
    ## The following variables are meant to be preceded by trigger variables
    BASE_CONTAINER: "registry.gitlab.com/nsf-noirlab/gemini/rtsw/epics-base/epics-base/testing/master:latest"

default:
    image: $BASE_CONTAINER

# rules used to create containers and associated RPM repositories 
# and to release rpms of the determinators to those
.rpmrepo-container-rules:
    rules:
        # Type app, creates ioc-specific container with RPM repo
        - &rpmrepo-container-app-stable
          if: '$CI_PROJECT_NAMESPACE =~ /.*\/iocs$/ && $CI_COMMIT_BRANCH =~ /^release\/.*$/ && $CI_PIPELINE_SOURCE != "pipeline" && $CI_PIPELINE_SOURCE != "trigger"' 
          variables: 
            TYPE: app
            MATURITY: stable
        - &rpmrepo-container-app-testing
          if: '$CI_PROJECT_NAMESPACE =~ /.*\/iocs$/ && $CI_COMMIT_BRANCH =~ /^testing\/.*$/ && $CI_PIPELINE_SOURCE != "pipeline" && $CI_PIPELINE_SOURCE != "trigger"' 
          variables: 
            TYPE: app
            MATURITY: testing
        - &rpmrepo-container-app-unstable
          if: '$CI_PROJECT_NAMESPACE =~ /.*\/iocs$/ && $CI_COMMIT_BRANCH =~ /^unstable\/.*$/ && $CI_PIPELINE_SOURCE != "pipeline" && $CI_PIPELINE_SOURCE != "trigger"' 
          variables: 
            TYPE: app
            MATURITY: unstable
        # Type epics-base, creates container with RPM repo for type 'epics-base'
        - &rpmrepo-container-epics-base-stable
          if: '$CI_PROJECT_NAME == "epics-base" && $CI_COMMIT_BRANCH =~ /^release\/.*$/ && $CI_PIPELINE_SOURCE != "pipeline" && $CI_PIPELINE_SOURCE != "trigger"'
          variables: 
            TYPE: epics-base
            MATURITY: stable
        - &rpmrepo-container-epics-base-testing
          if: '$CI_PROJECT_NAME == "epics-base" && $CI_COMMIT_BRANCH =~ /^testing\/.*$/ && $CI_PIPELINE_SOURCE != "pipeline" && $CI_PIPELINE_SOURCE != "trigger"'
          variables: 
            TYPE: epics-base
            MATURITY: testing
        - &rpmrepo-container-epics-base-unstable
          if: '$CI_PROJECT_NAME == "epics-base" && $CI_COMMIT_BRANCH =~ /^unstable\/.*$/ && $CI_PIPELINE_SOURCE != "pipeline" && $CI_PIPELINE_SOURCE != "trigger"'
          variables: 
            TYPE: epics-base
            MATURITY: unstable
        # Type common, creates container with RPM repo for type 'common'
        - &rpmrepo-container-common-stable
          if: '$CI_PROJECT_NAME == "gemini-ade" && $CI_COMMIT_BRANCH =~ /^release\/.*$/ && $CI_PIPELINE_SOURCE != "pipeline" && $CI_PIPELINE_SOURCE != "trigger"'
          variables: 
            TYPE: common
            MATURITY: stable
        - &rpmrepo-container-common-testing
          if: '$CI_PROJECT_NAME == "gemini-ade" && $CI_COMMIT_BRANCH =~ /^testing\/.*$/ && $CI_PIPELINE_SOURCE != "pipeline" && $CI_PIPELINE_SOURCE != "trigger"'
          variables: 
            TYPE: common
            MATURITY: testing
        - &rpmrepo-container-common-unstable
          if: '$CI_PROJECT_NAME == "gemini-ade" && $CI_COMMIT_BRANCH =~ /^unstable\/.*$/ && $CI_PIPELINE_SOURCE != "pipeline" && $CI_PIPELINE_SOURCE != "trigger"'
          variables: 
            TYPE: common
            MATURITY: unstable

# rules used to build rpms only and deploy it to already existing repo.
# This is for all projects that do not create a container and associated repo, 
# i.e. all support modules, all but gemini-ade in 'common' and all but
# epics-base in 'epics-base' type
.buildrpm-rules:
    rules:
        ## support modules can be released to either epics-base rpm repos (default) or 
        ## IOC specific rpm repos 
        ## (branch name then needs to be sth like testing/special/myIOC/myBranch)
        # don't execute if target project rpm repo is type common (which is wrong)
        - if: '$CI_PROJECT_NAMESPACE =~ /.*\/support$/ && $CI_COMMIT_BRANCH =~ /^.*\/special\/common\/.*$/'
          when: never
        # don't execute if target project rpm repo is type epics-base (which is default)
        - if: '$CI_PROJECT_NAMESPACE =~ /.*\/support$/ && $CI_COMMIT_BRANCH =~ /^.*\/special\/epics-base\/.*$/'
          when: never
        # Type app for support modules, released to the IOC-specific RPM repo
        - if: '$CI_PROJECT_NAMESPACE =~ /.*\/support$/ && $CI_COMMIT_BRANCH =~ /^.*\/special\/.*$/'
          variables: 
            TYPE: app
        # Type epics-base, released to the epics-base RPM repo (default)
        - if: '$CI_PROJECT_NAMESPACE =~ /.*\/support$/ && $CI_COMMIT_BRANCH'
          variables: 
            TYPE: epics-base
        ## epics-base modules can be released to either epics-base rpm repos (default) or 
        ## IOC specific rpm repos 
        ## (branch name then needs to be sth like testing/special/myIOC/myBranch)
        # don't execute if target project rpm repo is type common (which is wrong)
        - if: '$CI_PROJECT_NAMESPACE =~ /.*\/epics-base$/ && $CI_COMMIT_BRANCH =~ /^.*\/special\/common\/.*$/'
          when: never
        # don't execute if target project rpm repo is type epics-base (which is default)
        - if: '$CI_PROJECT_NAMESPACE =~ /.*\/epics-base$/ && $CI_COMMIT_BRANCH =~ /^.*\/special\/epics-base\/.*$/'
          when: never
        # Type app, released to the IOC-specific RPM repo
        - if: '$CI_PROJECT_NAMESPACE =~ /.*\/epics-base$/ && $CI_PROJECT_NAME != "epics-base" &&  $CI_COMMIT_BRANCH =~ /^.*\/special\/.*$/'
          variables: 
            TYPE: app
        # Type epics-base, released to the epics-base-specific RPM repo
        - if: '$CI_PROJECT_NAMESPACE =~ /.*\/epics-base$/ && $CI_PROJECT_NAME != "epics-base" &&  $CI_COMMIT_BRANCH'
          variables: 
            TYPE: epics-base
        ## common modules can be released to either common rpm repos (default) or 
        ## epics-base or IOC specific rpm repos 
        ## (branch name then needs to be sth like testing/special/epics-base/myBranch
        ## or testing/special/myIOC/myBranch, respectively)
        # don't execute if target project rpm repo is type common (which is default)
        - if: '$CI_PROJECT_NAMESPACE =~ /.*\/common$/ && $CI_COMMIT_BRANCH =~ /^.*\/special\/common\/.*$/'
          when: never
        # Type epics-base, released to the epics-base-specific RPM repo
        - if: '$CI_PROJECT_NAMESPACE =~ /.*\/common$/ && $CI_PROJECT_NAME != "gemini-ade" && $CI_COMMIT_BRANCH =~ /^.*\/special\/epics-base\/.*$/'
          variables: 
            TYPE: epics-base
        # Type app, released to the IOC-specific RPM repo
        - if: '$CI_PROJECT_NAMESPACE =~ /.*\/common$/ && $CI_PROJECT_NAME != "gemini-ade" && $CI_COMMIT_BRANCH =~ /^.*\/special\/.*$/'
          variables: 
            TYPE: app
        # Type common, released to the common-specific RPM repo
        - if: '$CI_PROJECT_NAMESPACE =~ /.*\/common$/ && $CI_PROJECT_NAME != "gemini-ade" && $CI_COMMIT_BRANCH'
          variables: 
            TYPE: common

.add-ssh-key:
    before_script:
        - dnf install openssh-clients -y
        - mkdir -p ~/.ssh/
        - echo -e "$SSH_PRIVATE" > ~/.ssh/id_rsa
        - chmod 600 ~/.ssh/id_rsa
        - eval `ssh-agent -s`
        - ssh-add ~/.ssh/id_rsa
        - ssh-keyscan hbfswgrepo-lv1.hi.gemini.edu >> ~/.ssh/known_hosts

.add-ssh-key-tito:
    before_script:
        - dnf install openssh-clients epel-release rsync -y
        - dnf install 'dnf-command(config-manager)' -y
        - dnf config-manager --set-enabled powertools 
        - dnf install tito -y
        - mkdir -p ~/.ssh/
        - echo -e "$SSH_PRIVATE" > ~/.ssh/id_rsa
        - chmod 600 ~/.ssh/id_rsa
        - eval `ssh-agent -s`
        - ssh-add ~/.ssh/id_rsa
        - ssh-keyscan hbfswgrepo-lv1.hi.gemini.edu >> ~/.ssh/known_hosts
